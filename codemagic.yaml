workflows:
  ios-workflow:
    name: Zuryo iOS Build
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.zuryotech.app"
        XCODE_WORKSPACE: "Zuryo.xcworkspace"
        XCODE_SCHEME: "Zuryo"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Set up certificate
        script: |
          CERTIFICATE_PATH=$CM_BUILD_DIR/certificate.p12
          echo $CM_CERTIFICATE | base64 --decode > $CERTIFICATE_PATH
          keychain add-certificates --certificate $CERTIFICATE_PATH --certificate-password $CM_CERTIFICATE_PASSWORD
      - name: Set up provisioning profile
        script: |
          PROFILE_PATH=$CM_BUILD_DIR/profile.mobileprovision
          echo $CM_PROVISIONING_PROFILE | base64 --decode > $PROFILE_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR
          pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles

          # Create export options plist
          cat > $CM_BUILD_DIR/export_options.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>2H83NUBAUG</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.zuryotech.app</key>
              <string>Zuryo App Store</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/Zuryo.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=2H83NUBAUG \
            PROVISIONING_PROFILE_SPECIFIER="Zuryo App Store" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            COMPILER_INDEX_STORE_ENABLE=NO

          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/Zuryo.xcarchive" \
            -exportOptionsPlist "$CM_BUILD_DIR/export_options.plist" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
